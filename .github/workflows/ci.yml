name: ci

on:
  pull_request:
    branches: [main, "relay/**"]
  push:
    branches: [main, "relay/**"]
  workflow_dispatch:

# Cancel in-flight runs for the same branch/PR when a new commit lands.
# Saves Action minutes on rapid iteration and avoids stale failures
# blocking merge.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # Bun version pinned to the same one declared in root package.json
      # (packageManager: "bun@1.3.14"). Bump both in lockstep.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Skip JetBrains plugin — needs Gradle + JDK and we don't ship it.
      - name: Typecheck
        run: bun turbo run typecheck --filter='!@kilocode/kilo-jetbrains'

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

  forbid-kilo-strings:
    name: no-new-kilo-refs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v5
        with:
          # Need both PR head and base for the diff.
          fetch-depth: 0

      # Tripwire for the cleanup branch: catch new code that re-introduces
      # phone-home strings or commercial Kilo branding. The Paso 0 audit
      # showed how easy these slip in inside dependency upgrades and
      # back-merges. Fail fast at PR time rather than discovering it after
      # publishing to Marketplace.
      - name: Detect new Kilo references in diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          # Look at ADDED lines (diff +) under packages/ for forbidden
          # hostnames and the PostHog write key we ripped out.
          FORBIDDEN='(api\.kilo\.ai|app\.kilo\.ai|chat\.kiloapps\.io|events\.kiloapps\.io|ingest\.kilosessions\.ai|supermassive-black-hole|phc_GK2Pxl0HPj5ZPfwhLRjXrtdz8eD7e9MKnXiFrOqnB6z)'
          if git diff "$BASE_SHA" "$HEAD_SHA" -- 'packages/**' \
              | grep -E "^\+" \
              | grep -v "^\+\+\+" \
              | grep -Ei "$FORBIDDEN"; then
            echo ""
            echo "::error::Forbidden Kilo phone-home string introduced. See docs/specs/kilo-gateway-audit.md."
            exit 1
          fi
          echo "OK — no new Kilo references."
