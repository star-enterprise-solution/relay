name: build-vsix

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (default: current ref)"
        required: false
        default: ""

# At most one build per tag at a time. If someone retags, the in-flight
# build gets cancelled and the new one wins.
concurrency:
  group: build-vsix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build .vsix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Repeat typecheck here even though CI runs it on every PR — the
      # tag could have been cut from a stale branch, or a hotfix tag
      # might bypass PRs. A failed typecheck after publish is much
      # worse than 30 extra seconds.
      - name: Typecheck
        run: bun turbo run typecheck --filter=relay

      # Bundle the extension code with esbuild and prepare the CLI binary
      # before vsce runs. vsce only zips files; the actual compiled
      # dist/extension.js (declared as `main` in package.json) needs to
      # exist first. The script also runs lint + typecheck again
      # internally — that's fine, those tasks are turbo-cached.
      - name: Build extension bundle
        working-directory: packages/kilo-vscode
        run: bun run package

      - name: Package .vsix
        working-directory: packages/kilo-vscode
        run: |
          # vsce reads name + version + publisher from package.json.
          # --no-dependencies because we bundle with esbuild — vsce
          # default would try to npm install the workspace deps, which
          # doesn't apply to monorepos.
          bunx vsce package --no-dependencies --skip-license -o ../../relay.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: relay-vsix
          path: relay.vsix
          retention-days: 30
          if-no-files-found: error

      # Attach to GitHub Release when this run was triggered by a tag push.
      # workflow_dispatch runs build the .vsix and stop — useful for
      # manual smoke tests without cutting a release.
      - name: Attach .vsix to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: relay.vsix
          fail_on_unmatched_files: true
