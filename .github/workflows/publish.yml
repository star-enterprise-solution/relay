name: publish

on:
  # Publish runs as a separate job triggered by a GitHub Release being
  # marked as "published" (not just created as draft). This gives us a
  # human-in-the-loop step between cutting the tag and pushing to the
  # marketplaces, which is the right tradeoff for the first many releases.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true

# Marketplaces are sloooow APIs and a duplicate publish call can produce
# weird half-published states. Strictly serialize.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  download-artifact:
    name: download .vsix
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - id: resolve
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      # Pull the .vsix from the release we just published. Done as a
      # separate small job so the heavy publishers below can run in
      # parallel against the same downloaded artifact.
      - name: Download .vsix from release
        run: |
          gh release download "${{ steps.resolve.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --pattern "relay.vsix"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-for-publish
          path: relay.vsix
          retention-days: 1

  marketplace:
    name: VS Code Marketplace
    needs: download-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: marketplace
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix-for-publish

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # vsce publish reads the publisher (`star-enterprise-solution`)
      # from the .vsix manifest. The PAT must have rights to that
      # publisher in Azure DevOps.
      # Set VSCE_PAT in repo secrets:
      #   https://github.com/<org>/<repo>/settings/environments/marketplace
      - name: Publish to VS Code Marketplace
        run: bunx vsce publish --packagePath relay.vsix --pat "$VSCE_PAT"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

  openvsx:
    name: Open VSX
    needs: download-artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: openvsx
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vsix-for-publish

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      # ovsx publish wants the same .vsix and an Open VSX access token.
      # Get one from https://open-vsx.org/user-settings/tokens
      # Set OVSX_PAT in repo secrets under environment "openvsx".
      - name: Publish to Open VSX
        run: bunx ovsx publish relay.vsix --pat "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
